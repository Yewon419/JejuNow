# iOS .ipa 클라우드 빌드 + TestFlight 업로드 (BUILD_PLAN §R4 — Windows 환경 우회)
# 서명 = App Store Connect API 키 기반 cloud signing (인증서·프로파일 수동 발급 불필요)
# 필요 시크릿 4종:
#   APPSTORE_API_KEY_ID      — ASC API 키 Key ID
#   APPSTORE_ISSUER_ID       — ASC API 키 Issuer ID
#   APPSTORE_API_PRIVATE_KEY — AuthKey_<ID>.p8 내용 base64
#   APPLE_TEAM_ID            — Apple Developer Team ID
name: ios-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install deps & sync Capacitor
        working-directory: app
        run: |
          npm ci
          npx cap sync ios
      - name: Write App Store Connect API key
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPSTORE_API_PRIVATE_KEY" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8
      # 아카이브는 서명 없이 생성한다. 자동 서명은 archive 단계에서 개발용 프로파일을
      # 요구하는데, CI에는 등록된 기기가 없어 발급이 불가능하다. 배포 서명은 export가 한다.
      - name: Archive (unsigned)
        working-directory: app/ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -destination 'generic/platform=iOS' -archivePath build/App.xcarchive archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            MARKETING_VERSION=1.0.0 \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}
      - name: Write exportOptions.plist
        working-directory: app/ios/App
        run: |
          cat > build/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
      - name: Export & upload to TestFlight
        working-directory: app/ios/App
        run: |
          xcodebuild -exportArchive -archivePath build/App.xcarchive \
            -exportOptionsPlist build/exportOptions.plist -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}
